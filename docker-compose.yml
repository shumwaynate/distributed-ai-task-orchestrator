services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      ORS_API_KEY: ${ORS_API_KEY:-}
      IDAHO_511_API_KEY: ${IDAHO_511_API_KEY:-}
      NEVADA_511_API_KEY: ${NEVADA_511_API_KEY:-}
      UTAH_UDOT_API_KEY: ${UTAH_UDOT_API_KEY:-}
      ARIZONA_511_API_KEY: ${ARIZONA_511_API_KEY:-}
    volumes:
      - .:/app
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=${WORKER_CONCURRENCY:-4} --hostname=docker_worker_${WORKER_CONCURRENCY:-4}@%h
    environment:
      REDIS_URL: redis://redis:6379/0
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      ORS_API_KEY: ${ORS_API_KEY:-}
      IDAHO_511_API_KEY: ${IDAHO_511_API_KEY:-}
      NEVADA_511_API_KEY: ${NEVADA_511_API_KEY:-}
      UTAH_UDOT_API_KEY: ${UTAH_UDOT_API_KEY:-}
      ARIZONA_511_API_KEY: ${ARIZONA_511_API_KEY:-}
    volumes:
      - .:/app
    depends_on:
      - redis
